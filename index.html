<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piedra Papel Tijera - 2 Jugadores</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Piedra Papel Tijera</h1>
  <div id="login">
    <h2>¿Quién eres?</h2>
    <button id="p1">Jugador 1</button>
    <button id="p2">Jugador 2</button>
  </div>
  <div id="game" style="display:none">
    <p id="status"></p>
    <button id="rock">🪨 Piedra</button>
    <button id="paper">📄 Papel</button>
    <button id="scissors">✂️ Tijeras</button>
    <h2 id="result"></h2>
    <button id="reset">Nueva partida</button>
  </div>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
